<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海岛奇兵数据中心 (Boom Beach Data Hub)</title>

        /* * 纯原生 CSS 重构，不再依赖任何外部网络 CDN
         * 确保在本地打包为 Android App 时 100% 完美运行 
         */
        :root {
            --primary: #0ea5e9;
            --bg-color: #f4f7f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            height: 100dvh; /* 适配移动端动态浏览器工具栏高度 */
            width: 100vw;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 隐藏滚动条 --- */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- 毛玻璃基础类 --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* --- 侧边栏 --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            border-right: 1px solid rgba(0,0,0,0.05);
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-weight: bold;
            font-size: 1.125rem;
            color: #111827;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            color: #374151;
            transition: all 0.2s;
            width: 100%;
        }

        .nav-item:hover { background: rgba(255,255,255,0.6); }
        .nav-item.active {
            background: rgba(255,255,255,0.9);
            border-left: 4px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .nav-icon { font-size: 1.2rem; margin-right: 12px; }

        /* --- 主内容区 --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 30;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-left { display: flex; align-items: center; }
        
        .menu-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
        }
        .menu-btn:hover { background: rgba(0,0,0,0.05); }

        .header-title {
            margin-left: 16px;
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* 搜索框 */
        .search-box { position: relative; width: 220px; }
        .search-input {
            width: 100%;
            padding: 8px 16px 8px 36px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: rgba(255,255,255,0.7);
            outline: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(14,165,233,0.2);
            background: #fff;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 60px 24px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .breadcrumb svg { width: 14px; height: 14px; margin: 0 6px; fill: currentColor; }
        .breadcrumb-current { color: var(--primary); font-weight: 500; }

        /* 子分类导航条 */
        .sub-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .sub-nav-btn {
            padding: 8px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: #4b5563;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        @media (hover: hover) {
            .sub-nav-btn:hover {
                background: rgba(255, 255, 255, 0.9);
                transform: translateY(-1px);
            }
        }
        
        .sub-nav-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        /* 响应式网格布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        
        @media (hover: hover) {
            .data-card:hover {
                transform: translateY(-4px) translateZ(0);
                box-shadow: 0 10px 20px rgba(0,0,0,0.06);
                background: rgba(255, 255, 255, 0.8);
            }
        }

        .data-card:active {
            transform: scale(0.96) translateZ(0);
            background: rgba(255, 255, 255, 0.9);
            transition: transform 0.1s;
        }

        .card-img-box {
            width: 100%;
            height: 80px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.03);
            overflow: hidden; /* 防止内部图片溢出 */
        }
        .card-img-box svg { width: 28px; height: 28px; fill: #d1d5db; }
        
        .card-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        /* 移动端适配 */
        #mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
            z-index: 40;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }
        #mobile-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                box-shadow: 4px 0 24px rgba(0,0,0,0.15);
            }
            .sidebar-hidden {
                transform: translateX(-100%);
            }
            .header-title { display: none; }
            .search-box { width: 160px; }
            .content-area { padding: 16px 16px 80px 16px; } 
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
            .data-card { padding: 12px; }
            .card-img-box { height: 70px; }
        }
    </style>
</head>

        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar');

        const breadcrumbCurrent = document.getElementById('breadcrumb-current');

        const dataContainer = document.getElementById('data-container');

        const searchInput = document.getElementById('search-input');

        function initNav() {
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `nav-item ${category.id === currentActiveId ? 'active' : ''}`;
                btn.onclick = () => switchCategory(category);
                btn.innerHTML = `<span class="nav-icon">${category.icon}</span> <span>${category.name}</span>`;
                navList.appendChild(btn);
            });
            updateSidebarState();
            switchCategory(categories[0]); 
        }

        function switchCategory(category) {
            currentActiveId = category.id;
            searchInput.value = ''; 
            
            const items = navList.querySelectorAll('.nav-item');
            items.forEach((item, index) => {
                if (categories[index].id === category.id) item.classList.add('active');
                else item.classList.remove('active');
            });

            currentTitle.textContent = category.name;
            breadcrumbCurrent.textContent = category.name;
            
            const categoryData = dbData[category.id];
            currentActiveGroup = categoryData[0] ? categoryData[0].group : null;

            renderSubNav(category);
            renderDataGrid(category.id, currentActiveGroup);

            if (window.innerWidth < 768) {
                sidebarOpen = false;
                updateSidebarState();
            }
        }

        function renderSubNav(category) {
            subNavContainer.innerHTML = '';
            const categoryData = dbData[category.id];
            
            if (categoryData.length <= 1 && !categoryData[0].group) {
                subNavContainer.style.display = 'none';
                return;
            }

            subNavContainer.style.display = 'flex';
            categoryData.forEach(section => {
                if (section.group) {
                    const btn = document.createElement('button');
                    btn.className = `sub-nav-btn ${section.group === currentActiveGroup ? 'active' : ''}`;
                    btn.textContent = section.group;
                    btn.onclick = () => {
                        currentActiveGroup = section.group;
                        Array.from(subNavContainer.children).forEach(child => child.classList.remove('active'));
                        btn.classList.add('active');
                        renderDataGrid(category.id, currentActiveGroup);
                    };
                    subNavContainer.appendChild(btn);
                }
            });
        }

        function renderDataGrid(categoryId, groupName) {
            dataContainer.innerHTML = '';
            const categoryData = dbData[categoryId];

            if (!categoryData || categoryData.length === 0) return;

            const grid = document.createElement('div');
            grid.className = 'grid-container';

            if (groupName === '全部') {
                categoryData.forEach(section => {
                    if (section.group !== '全部') {
                        section.items.forEach(itemObj => {
                            grid.appendChild(createCardHTML(itemObj));
                        });
                    }
                });
            } else {
                const section = categoryData.find(s => s.group === groupName) || categoryData[0];
                if (!section || !section.items) return;

                section.items.forEach(itemObj => {
                    grid.appendChild(createCardHTML(itemObj));
                });
            }
            
            dataContainer.appendChild(grid);
        }

        // 修改后的卡片生成逻辑：完美兼容有图和无图状态
        function createCardHTML(itemObj) {
            const card = document.createElement('div');
            card.className = 'data-card';
            
            // 智能判断：如果填写了图片链接，则显示图片；如果为空，则默认显示原本的 SVG 图标
            let imageHtml = '';
            if (itemObj.img && itemObj.img.trim() !== '') {
                // object-fit: contain 会让图片完美自动缩放，无需手动调大小
                imageHtml = `<img src="${itemObj.img}" alt="${itemObj.name}" style="width: 100%; height: 100%; object-fit: contain; pointer-events: none;">`;
            } else {
                imageHtml = `<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;
            }

            card.innerHTML = `
                <div class="card-img-box" style="padding: 6px;">
                    ${imageHtml}
                </div>
                <div class="card-title" title="${itemObj.name}">${itemObj.name}</div>
            `;
            return card;
        }

        // 修改后的搜索功能逻辑
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.trim().toLowerCase();
            if (!keyword) {
                switchCategory(categories.find(c => c.id === currentActiveId));
                return;
            }

            currentTitle.textContent = "搜索结果";
            breadcrumbCurrent.textContent = `包含 "${keyword}" 的数据`;
            subNavContainer.style.display = 'none'; 
            dataContainer.innerHTML = '';
            
            const grid = document.createElement('div');
            grid.className = 'grid-container';
            let resultCount = 0;

            for (const catId in dbData) {
                dbData[catId].forEach(section => {
                    if(section.group === '全部' && section.items.length === 0) return;

                    section.items.forEach(itemObj => {
                        // 匹配对象的 name 属性
                        if (itemObj.name.toLowerCase().includes(keyword)) {
                            grid.appendChild(createCardHTML(itemObj));
                            resultCount++;
                        }
                    });
                });
            }

            if (resultCount === 0) {
                dataContainer.innerHTML = `<div style="text-align:center; padding: 40px; color: #9ca3af;">未找到与 "${keyword}" 相关的结果</div>`;
            } else {
                dataContainer.appendChild(grid);
            }
        });

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            updateSidebarState();
        }

        function updateSidebarState() {
            const isMob = window.innerWidth < 768; 
            if (sidebarOpen) {
                sidebar.classList.remove('sidebar-hidden');
                if (isMob) mobileOverlay.classList.add('show');
            } else {
                sidebar.classList.add('sidebar-hidden');
                if (isMob) mobileOverlay.classList.remove('show');
            }
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        mobileOverlay.addEventListener('click', () => {
            sidebarOpen = false;
            updateSidebarState();
        });

        window.addEventListener('resize', () => {
            const isMob = window.innerWidth < 768;
            if (isMob && sidebarOpen) {
                 sidebarOpen = false;
                 updateSidebarState();
            } else if (!isMob && !sidebarOpen) {
                 sidebarOpen = true;
                 updateSidebarState();
            }
        });

        initNav();
    </script>
</body>
</html>
